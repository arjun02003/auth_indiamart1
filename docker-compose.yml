version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: indiamart_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: asnexpo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: indiamart_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/asnexpo_db
      - JWT_SECRET=change_this_to_a_secure_secret
      - PORT=5000
    depends_on:
      - db
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: indiamart_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
